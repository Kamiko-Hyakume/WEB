<!DOCTYPE html>
<html lang="pt-BR" ng-app="OrchestratorApp">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orquestrador RPA 2.0 — Login</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/angular.js/1.8.3/angular.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0a0c10;
  --bg2:     #111318;
  --bg3:     #181c24;
  --surface: #1e2330;
  --surface2:#252b38;
  --border:  rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text:    #e8eaf0;
  --text2:   #8b92a5;
  --text3:   #545c6e;
  --accent:  #4f8ef7;
  --accent2: #3a6fd4;
  --green:   #22d3a0;
  --red:     #f05757;
  --amber:   #f5a623;
  --purple:  #a78bfa;
  --cyan:    #22d3ee;
  --font:    'DM Sans', sans-serif;
  --mono:    'JetBrains Mono', monospace;
  --r:       8px;
  --r2:      12px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(79,142,247,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(79,142,247,0.03) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
}
.glow-blob {
  position: fixed; border-radius: 50%;
  filter: blur(120px); pointer-events: none; opacity: 0.18;
}
.glow-blob.a { width:600px;height:600px;background:var(--accent);top:-200px;left:-200px;animation:floatA 14s ease-in-out infinite; }
.glow-blob.b { width:400px;height:400px;background:var(--purple);bottom:-100px;right:-100px;animation:floatB 18s ease-in-out infinite; }
@keyframes floatA { 0%,100%{transform:translate(0,0)} 50%{transform:translate(60px,40px)} }
@keyframes floatB { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-40px,-30px)} }

.login-wrap {
  position: relative; z-index: 1;
  width: 100%; max-width: 420px;
  padding: 16px;
  animation: fadeUp 0.4s ease both;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}

.login-card {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 16px;
  padding: 36px 36px 32px;
  box-shadow: 0 32px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(79,142,247,0.06);
}

/* Logo */
.login-logo { display:flex;align-items:center;gap:12px;margin-bottom:32px; }
.logo-icon {
  width:40px;height:40px;background:var(--accent);border-radius:10px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  box-shadow:0 0 20px rgba(79,142,247,0.35);
}
.logo-icon svg { width:22px;height:22px;fill:none;stroke:white;stroke-width:2; }
.logo-text  { font-size:15px;font-weight:600;letter-spacing:0.02em; }
.logo-sub   { font-size:11px;color:var(--text3);font-family:var(--mono);letter-spacing:0.05em;margin-top:1px; }

/* Heading */
.login-heading { margin-bottom:24px; }
.login-heading h1 { font-size:20px;font-weight:600;color:var(--text);margin-bottom:6px; }
.login-heading p  { font-size:13px;color:var(--text2);line-height:1.5; }
.divider { height:1px;background:var(--border);margin-bottom:24px; }

/* Pills */
.login-type {
  display:flex;gap:4px;background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--r);padding:3px;margin-bottom:28px;
}
.login-type-btn {
  flex:1;padding:7px 10px;border-radius:6px;border:none;
  font-size:12px;font-weight:500;font-family:var(--font);cursor:pointer;
  color:var(--text3);background:transparent;transition:all 0.15s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.login-type-btn svg { width:13px;height:13px; }
.login-type-btn.active { background:var(--surface2);color:var(--text); }
.login-type-btn:hover:not(.active) { color:var(--text2); }

/* ── MD3 Floating Label Field ── */
.md-field {
  position: relative;
  margin-bottom: 20px;
}
.md-field .field-box {
  position: relative;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  transition: border-color 0.2s, box-shadow 0.2s;
  display: flex;
  align-items: center;
}
.md-field .field-box:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(79,142,247,0.12);
}
/* The floating label sits inside the box */
.md-field label {
  position: absolute;
  left: 40px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 13px;
  color: var(--text3);
  pointer-events: none;
  transition: top 0.18s ease, font-size 0.18s ease, color 0.18s ease, background 0.18s ease, padding 0.18s ease, transform 0.18s ease;
  white-space: nowrap;
  z-index: 1;
  line-height: 1;
}
/* Floated state: label moves up, cuts through the border */
.md-field.floated label {
  top: 0;
  transform: translateY(-50%);
  font-size: 11px;
  color: var(--accent);
  background: var(--bg3);
  padding: 0 4px;
  left: 36px;
}
/* Left icon */
.md-field .field-icon {
  position: absolute;
  left: 12px;
  top: 50%; transform: translateY(-50%);
  width: 16px; height: 16px;
  color: var(--text3);
  pointer-events: none;
  display: flex; align-items: center; justify-content: center;
  transition: color 0.2s;
  z-index: 2;
}
.md-field .field-icon svg { width:16px;height:16px;display:block; }
.md-field .field-box:focus-within .field-icon { color: var(--accent); }

/* The actual input */
.md-field input {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-size: 13px;
  font-family: var(--font);
  padding: 14px 40px 14px 40px;
  line-height: 1;
  -webkit-appearance: none;
  -moz-appearance: none;
}
/* placeholder só aparece quando o label já subiu */
.md-field input::placeholder { color: transparent; transition: color 0.15s; }
.md-field.floated input::placeholder { color: var(--text3); }
.md-field input::-ms-reveal,
.md-field input::-ms-clear,
.md-field input::-webkit-contacts-auto-fill-button,
.md-field input::-webkit-credentials-auto-fill-button { display:none!important; }

/* Right toggle (eye icon) */
.md-field .eye-btn {
  position: absolute;
  right: 10px;
  top: 50%; transform: translateY(-50%);
  width: 28px; height: 28px;
  background: none; border: none;
  color: var(--text3);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  border-radius: 6px;
  transition: color 0.15s, background 0.15s;
  flex-shrink: 0;
  z-index: 3;
}
.md-field .eye-btn:hover { color: var(--text2); background: var(--border); }
.md-field .eye-btn svg { width:16px;height:16px;display:block;pointer-events:none; }

/* Extras row */
.form-extras {
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:24px;margin-top:-4px;
}
.remember { display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);cursor:pointer;user-select:none; }
.remember input[type="checkbox"] { width:15px;height:15px;padding:0;accent-color:var(--accent);cursor:pointer; }
.forgot { font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;font-family:var(--font);transition:color 0.15s; }
.forgot:hover { color:#7eb4ff; }

/* Submit */
.btn-login {
  width:100%;padding:12px 20px;
  background:var(--accent);color:white;
  border:none;border-radius:var(--r);
  font-size:14px;font-weight:600;font-family:var(--font);cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:background 0.15s,transform 0.1s,box-shadow 0.15s;
  box-shadow:0 4px 20px rgba(79,142,247,0.3);
}
.btn-login:hover:not(:disabled) { background:var(--accent2);box-shadow:0 4px 24px rgba(79,142,247,0.45); }
.btn-login:active:not(:disabled) { transform:scale(0.99); }
.btn-login:disabled { opacity:0.55;cursor:not-allowed; }
.btn-login svg { width:16px;height:16px; }
.spinner { width:15px;height:15px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.6s linear infinite;flex-shrink:0; }
@keyframes spin { to{transform:rotate(360deg)} }

/* Error */
.alert-error {
  display:flex;align-items:center;gap:10px;
  background:rgba(240,87,87,0.1);border:1px solid rgba(240,87,87,0.25);
  color:#f08080;border-radius:var(--r);padding:11px 14px;
  font-size:13px;margin-bottom:20px;animation:fadeUp 0.25s ease both;
}
.alert-error svg { width:15px;height:15px;flex-shrink:0;color:var(--red); }

/* Footer */
.login-footer { margin-top:28px;text-align:center;font-size:11px;color:var(--text3);font-family:var(--mono); }

::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border2);border-radius:2px; }
</style>
</head>
<body ng-controller="LoginCtrl">

<div class="glow-blob a"></div>
<div class="glow-blob b"></div>

<div class="login-wrap">
  <div class="login-card">

    <!-- Logo -->
    <div class="login-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <div>
        <div class="logo-text">Orquestrador</div>
        <div class="logo-sub">RPA 2.0</div>
      </div>
    </div>

    <!-- Heading -->
    <div class="login-heading">
      <h1>Bem-vindo de volta</h1>
      <p>Acesse o painel para gerenciar seus robôs e automações.</p>
    </div>
    <div class="divider"></div>

    <!-- Pills -->
    <div class="login-type">
      <button class="login-type-btn" ng-class="{active: tipo==='user'}" ng-click="tipo='user'; resetForm()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Usuário
      </button>
      <button class="login-type-btn" ng-class="{active: tipo==='robot'}" ng-click="tipo='robot'; resetForm()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/><path d="M9 7h6M9 11h6"/></svg>
        Robô / API
      </button>
    </div>

    <!-- Erro -->
    <div class="alert-error" ng-if="erro">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      {{ erro }}
    </div>

    <!-- ── Formulário Usuário ── -->
    <div ng-if="tipo==='user'">

      <!-- E-mail -->
      <div class="md-field" ng-class="{floated: form.email || focus.email}" >
        <div class="field-box">
          <span class="field-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </span>
          <label>E-mail</label>
          <input type="email" ng-model="form.email"
                 placeholder="seu@email.com"
                 ng-focus="focus.email=true"
                 ng-blur="focus.email=false"
                 ng-keyup="$event.keyCode===13 && entrar()"
                 autocomplete="email"/>
        </div>
      </div>

      <!-- Senha -->
      <div class="md-field" ng-class="{floated: form.senha || focus.senha}">
        <div class="field-box">
          <span class="field-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          </span>
          <label>Senha</label>
          <input id="senha-input"
                 type="password"
                 placeholder="mínimo 8 caracteres"
                 ng-model="form.senha"
                 ng-focus="focus.senha=true"
                 ng-blur="focus.senha=false"
                 ng-keyup="$event.keyCode===13 && entrar()"
                 autocomplete="current-password"/>
          <button class="eye-btn" type="button" tabindex="-1" ng-mousedown="toggleSenha($event)">
            <svg ng-if="!mostrarSenha" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg ng-if="mostrarSenha" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>

      <div class="form-extras">
        <label class="remember">
          <input type="checkbox" ng-model="form.lembrar"/> Lembrar-me
        </label>
        <button class="forgot" ng-click="esqueceuSenha()">Esqueceu a senha?</button>
      </div>

      <button class="btn-login" ng-click="entrar()" ng-disabled="carregando || !form.email || !form.senha">
        <span class="spinner" ng-if="carregando"></span>
        <svg ng-if="!carregando" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
        <span>{{ carregando ? 'Autenticando...' : 'Entrar' }}</span>
      </button>
    </div>

    <!-- ── Formulário Robô / API ── -->
    <div ng-if="tipo==='robot'">

      <!-- API Key -->
      <div class="md-field" ng-class="{floated: form.apikey || focus.apikey}">
        <div class="field-box">
          <span class="field-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
          </span>
          <label>API Key</label>
          <input type="text" ng-model="form.apikey"
                 placeholder="rpa_key_xxxxxxxxxxxxxxxx"
                 ng-focus="focus.apikey=true"
                 ng-blur="focus.apikey=false"
                 ng-keyup="$event.keyCode===13 && entrar()"
                 style="font-family:var(--mono);font-size:12px;"/>
        </div>
      </div>

      <!-- API Secret -->
      <div class="md-field" ng-class="{floated: form.secret || focus.secret}">
        <div class="field-box">
          <span class="field-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          </span>
          <label>API Secret</label>
          <input id="secret-input"
                 type="password"
                 placeholder="sk_xxxxxxxxxxxxxxxxxxxxxxxx"
                 ng-model="form.secret"
                 ng-focus="focus.secret=true"
                 ng-blur="focus.secret=false"
                 ng-keyup="$event.keyCode===13 && entrar()"
                 style="font-family:var(--mono);font-size:12px;"/>
          <button class="eye-btn" type="button" tabindex="-1" ng-mousedown="toggleSecret($event)">
            <svg ng-if="!mostrarSecret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg ng-if="mostrarSecret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>

      <div style="margin-bottom:24px"></div>

      <button class="btn-login" ng-click="entrar()" ng-disabled="carregando || !form.apikey || !form.secret">
        <span class="spinner" ng-if="carregando"></span>
        <svg ng-if="!carregando" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/><path d="M9 7h6M9 11h6"/></svg>
        <span>{{ carregando ? 'Autenticando...' : 'Autenticar Robô' }}</span>
      </button>
    </div>

  </div>
  <div class="login-footer">
    Orquestrador RPA 2.0 &nbsp;·&nbsp; POST /api/v1/auth/{{ tipo === 'robot' ? 'robot' : 'login' }}
  </div>
</div>

<script>
angular.module('OrchestratorApp', [])
.controller('LoginCtrl', function($scope, $timeout) {
  $scope.tipo         = 'user';
  $scope.form         = {};
  $scope.focus        = {};
  $scope.carregando   = false;
  $scope.erro         = '';
  $scope.mostrarSenha  = false;
  $scope.mostrarSecret = false;

  // Pré-preenche se lembrar-me estava marcado
  var lembrar = localStorage.getItem('rpa_lembrar');
  var savedSession = JSON.parse(localStorage.getItem('rpa_session') || 'null');
  if (lembrar === 'true' && savedSession) {
    $scope.form = savedSession;
    $scope.form.lembrar = true;
  }

  var DEMO_EMAIL  = 'admin@rpa.com';
  var DEMO_SENHA  = 'admin123';
  var DEMO_APIKEY = 'rpa_key_demo';
  var DEMO_SECRET = 'secret_demo';

  $scope.resetForm = function() {
    $scope.form = {};
    $scope.erro = '';
    $scope.mostrarSenha  = false;
    $scope.mostrarSecret = false;
  };

  // Use mousedown + preventDefault to avoid blur before toggle fires
  $scope.toggleSenha = function($event) {
    $event.preventDefault();
    $scope.mostrarSenha = !$scope.mostrarSenha;
    var el = document.getElementById('senha-input');
    el.type = $scope.mostrarSenha ? 'text' : 'password';
    el.focus();
  };

  $scope.toggleSecret = function($event) {
    $event.preventDefault();
    $scope.mostrarSecret = !$scope.mostrarSecret;
    var el = document.getElementById('secret-input');
    el.type = $scope.mostrarSecret ? 'text' : 'password';
    el.focus();
  };

  $scope.entrar = function() {
    $scope.erro = '';
    if ($scope.carregando) return;
    var ok = false;
    if ($scope.tipo === 'user') {
      if (!$scope.form.email || !$scope.form.senha) return;
      ok = ($scope.form.email === DEMO_EMAIL && $scope.form.senha === DEMO_SENHA);
    } else {
      if (!$scope.form.apikey || !$scope.form.secret) return;
      ok = ($scope.form.apikey === DEMO_APIKEY && $scope.form.secret === DEMO_SECRET);
    }
    $scope.carregando = true;
    $timeout(function() {
      $scope.carregando = false;
      if (ok) {
        var sessionData = $scope.tipo === 'user'
          ? { email: $scope.form.email, senha: $scope.form.senha }
          : { apikey: $scope.form.apikey, secret: $scope.form.secret };
        localStorage.setItem('rpa_lembrar', $scope.form.lembrar ? 'true' : 'false');
        if ($scope.form.lembrar) {
          localStorage.setItem('rpa_session', JSON.stringify(sessionData));
        } else {
          localStorage.removeItem('rpa_session');
        }
        window.location.href = 'index.html';
      } else {
        $scope.erro = $scope.tipo === 'user'
          ? 'E-mail ou senha inválidos. Verifique suas credenciais.'
          : 'API Key ou Secret inválidos.';
      }
    }, 1400);
  };

  $scope.esqueceuSenha = function() {
    alert('Link de recuperação enviado para: ' + ($scope.form.email || 'seu e-mail'));
  };
});
</script>
</body>
</html>
