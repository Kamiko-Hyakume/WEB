<!DOCTYPE html>
<html lang="pt-BR" ng-app="OrchestratorApp">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orquestrador RPA 2.0 — Login</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/angular.js/1.8.3/angular.min.js"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="login.css">
</head>

<body ng-controller="LoginCtrl">

  <div class="glow-blob glow-blob--primary"></div>
  <div class="glow-blob glow-blob--secondary"></div>

  <div class="login-wrapper">
    <div class="login-card">

      <!-- Logo -->
      <div class="login-logo">
        <div class="login-logo__icon">
          <svg viewBox="0 0 24 24">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
          </svg>
        </div>
        <div>
          <div class="login-logo__name">Orquestrador</div>
          <div class="login-logo__version">RPA 2.0</div>
        </div>
      </div>

      <!-- Heading -->
      <div class="login-heading">
        <h1 class="login-heading__title">Bem-vindo de volta</h1>
        <p class="login-heading__subtitle">Acesse o painel para gerenciar seus robôs e automações.</p>
      </div>
      <div class="login-divider"></div>

      <!-- Pills de tipo de autenticação -->
      <div class="login-type-tabs">
        <button class="login-type-tab" ng-class="{active: tipo==='user'}" ng-click="tipo='user'; resetForm()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
          Usuário
        </button>
        <button class="login-type-tab" ng-class="{active: tipo==='robot'}" ng-click="tipo='robot'; resetForm()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="5" y="2" width="14" height="20" rx="2" />
            <line x1="12" y1="18" x2="12.01" y2="18" />
            <path d="M9 7h6M9 11h6" />
          </svg>
          Robô / API
        </button>
      </div>

      <!-- Erro -->
      <div class="alert-error" ng-if="erro">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10" />
          <line x1="12" y1="8" x2="12" y2="12" />
          <line x1="12" y1="16" x2="12.01" y2="16" />
        </svg>
        {{ erro }}
      </div>

      <!-- ── Formulário Usuário ── -->
      <div ng-if="tipo==='user'">

        <!-- E-mail -->
        <div class="field" ng-class="{'field--floated': form.email || focus.email}">
          <div class="field__box">
            <span class="field__icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                <polyline points="22,6 12,13 2,6" />
              </svg>
            </span>
            <label class="field__label">E-mail</label>
            <input class="field__input" type="email" ng-model="form.email" placeholder="seu@email.com"
              ng-focus="focus.email=true" ng-blur="focus.email=false" ng-keyup="$event.keyCode===13 && entrar()"
              autocomplete="email" />
          </div>
        </div>

        <!-- Senha -->
        <div class="field" ng-class="{'field--floated': form.senha || focus.senha}">
          <div class="field__box">
            <span class="field__icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" />
                <path d="M7 11V7a5 5 0 0110 0v4" />
              </svg>
            </span>
            <label class="field__label">Senha</label>
            <input id="senha-input" class="field__input" type="password" placeholder="mínimo 8 caracteres"
              ng-model="form.senha" ng-focus="focus.senha=true" ng-blur="focus.senha=false"
              ng-keyup="$event.keyCode===13 && entrar()" autocomplete="current-password" />
            <button class="field__toggle-visibility" type="button" tabindex="-1" ng-mousedown="toggleSenha($event)">
              <svg ng-if="!mostrarSenha" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
              <svg ng-if="mostrarSenha" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path
                  d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24" />
                <line x1="1" y1="1" x2="23" y2="23" />
              </svg>
            </button>
          </div>
        </div>

        <div class="form-extras">
          <label class="form-remember">
            <input class="form-remember__checkbox" type="checkbox" ng-model="form.lembrar" /> Lembrar-me
          </label>
          <button class="form-forgot" ng-click="esqueceuSenha()">Esqueceu a senha?</button>
        </div>

        <button class="btn-login" ng-click="entrar()" ng-disabled="carregando || !form.email || !form.senha">
          <span class="spinner" ng-if="carregando"></span>
          <svg ng-if="!carregando" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="9 18 15 12 9 6" />
          </svg>
          <span>{{ carregando ? 'Autenticando...' : 'Entrar' }}</span>
        </button>
      </div>

      <!-- ── Formulário Robô / API ── -->
      <div ng-if="tipo==='robot'">

        <!-- API Key -->
        <div class="field" ng-class="{'field--floated': form.apikey || focus.apikey}">
          <div class="field__box">
            <span class="field__icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path
                  d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4" />
              </svg>
            </span>
            <label class="field__label">API Key</label>
            <input class="field__input field__input--mono" type="text" ng-model="form.apikey"
              placeholder="rpa_key_xxxxxxxxxxxxxxxx" ng-focus="focus.apikey=true" ng-blur="focus.apikey=false"
              ng-keyup="$event.keyCode===13 && entrar()" />
          </div>
        </div>

        <!-- API Secret -->
        <div class="field" ng-class="{'field--floated': form.secret || focus.secret}">
          <div class="field__box">
            <span class="field__icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" />
                <path d="M7 11V7a5 5 0 0110 0v4" />
              </svg>
            </span>
            <label class="field__label">API Secret</label>
            <input id="secret-input" class="field__input field__input--mono" type="password"
              placeholder="sk_xxxxxxxxxxxxxxxxxxxxxxxx" ng-model="form.secret" ng-focus="focus.secret=true"
              ng-blur="focus.secret=false" ng-keyup="$event.keyCode===13 && entrar()" />
            <button class="field__toggle-visibility" type="button" tabindex="-1" ng-mousedown="toggleSecret($event)">
              <svg ng-if="!mostrarSecret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
              <svg ng-if="mostrarSecret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path
                  d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24" />
                <line x1="1" y1="1" x2="23" y2="23" />
              </svg>
            </button>
          </div>
        </div>

        <div class="form-spacer"></div>

        <button class="btn-login" ng-click="entrar()" ng-disabled="carregando || !form.apikey || !form.secret">
          <span class="spinner" ng-if="carregando"></span>
          <svg ng-if="!carregando" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <rect x="5" y="2" width="14" height="20" rx="2" />
            <line x1="12" y1="18" x2="12.01" y2="18" />
            <path d="M9 7h6M9 11h6" />
          </svg>
          <span>{{ carregando ? 'Autenticando...' : 'Autenticar Robô' }}</span>
        </button>
      </div>

    </div>
    <div class="login-footer">
      Orquestrador RPA 2.0 &nbsp;·&nbsp; POST /api/v1/auth/{{ tipo === 'robot' ? 'robot' : 'login' }}
    </div>
  </div>

  <script src="login.js"></script>
</body>

</html>
